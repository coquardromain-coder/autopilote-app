version: '3.8'
services:
  dolibarr:
    image: tuxgasy/dolibarr:latest
    container_name: dolibarr
    environment:
      DOLI_DB_HOST: dolibarr_db
      DOLI_DB_NAME: dolibarr
      DOLI_DB_USER: dolibarr
      DOLI_DB_PASSWORD: ${DOLIBARR_DB_PASSWORD}
      DOLI_ADMIN_LOGIN: admin
      DOLI_ADMIN_PASSWORD: ${DOLIBARR_ADMIN_PASSWORD}
      DOLI_URL_ROOT: https://dolibarr.famcofinances.com
      DOLI_COMPANY_NAME: ${DOLIBARR_COMPANY_NAME}
      DOLI_COMPANY_COUNTRY_ID: 1
      DOLI_MODULES: "modFacture,modCommande,modComptabilite,modSociete,modProduct,modPropal,modBanque,modTax"
    ports:
      - "8080:80"
    depends_on:
      - dolibarr_db
    volumes:
      - dolibarr_data:/var/www/html/documents

  dolibarr_db:
    image: mysql:8.0
    container_name: dolibarr_db
    environment:
      MYSQL_ROOT_PASSWORD: ${DOLIBARR_DB_ROOT_PASSWORD}
      MYSQL_DATABASE: dolibarr
      MYSQL_USER: dolibarr
      MYSQL_PASSWORD: ${DOLIBARR_DB_PASSWORD}
    volumes:
      - dolibarr_db_data:/var/lib/mysql

volumes:
  dolibarr_data:
  dolibarr_db_data:
