# ════════════════════════════════════════════════════════════════
#  Dolibarr sur Coolify v4.1.1 — réseau coolify PERMANENT
# ════════════════════════════════════════════════════════════════
#
# Cette version connecte Dolibarr et sa base au réseau "coolify" (où réside
# Traefik) DIRECTEMENT dans le compose → plus besoin de "docker network connect"
# manuel après chaque redéploiement.
#
# ⚠️ Le réseau externe doit s'appeler EXACTEMENT comme celui du proxy Coolify.
#    Vérifie-le en SSH sur l'hôte :
#      docker inspect coolify-proxy \
#        --format '{{range $k,$v := .NetworkSettings.Networks}}{{println $k}}{{end}}'
#    (souvent "coolify"). Si différent, remplace "coolify" ci-dessous.
#
# ┌─ DANS COOLIFY ────────────────────────────────────────────────┐
# │ 1. Ressource Docker Compose → colle ce fichier.                │
# │ 2. "Domains" du service dolibarr : https://dolibarr.famcofinances.com │
# │ 3. Environment Variables : les 4 DOLIBARR_*                     │
# │ 4. Deploy → attends 2-3 min.                                   │
# └───────────────────────────────────────────────────────────────┘

services:
  dolibarr:
    # Image personnalisée : corrige l'API REST (PATH_INFO) via Apache + mod_rewrite
    build:
      context: .
      dockerfile: Dockerfile.dolibarr
    restart: unless-stopped
    environment:
      # Variable magique Coolify : expose le service sur le port 80 + routage Traefik
      - SERVICE_FQDN_DOLIBARR_80
      - DOLI_DB_HOST=dolibarr_db
      - DOLI_DB_NAME=dolibarr
      - DOLI_DB_USER=dolibarr
      - DOLI_DB_PASSWORD=${DOLIBARR_DB_PASSWORD}
      - DOLI_ADMIN_LOGIN=admin
      - DOLI_ADMIN_PASSWORD=${DOLIBARR_ADMIN_PASSWORD}
      - DOLI_URL_ROOT=https://dolibarr.famcofinances.com
      - DOLI_COMPANY_NAME=${DOLIBARR_COMPANY_NAME}
      - DOLI_COMPANY_COUNTRY_ID=1
      - DOLI_MODULES=modFacture,modCommande,modComptabilite,modSociete,modProduct,modPropal,modBanque,modTax
      - DOLI_INSTALL_AUTO=1
      - DOLI_PROD=1
      - PHP_INI_DATE_TIMEZONE=Europe/Paris
    depends_on:
      dolibarr_db:
        condition: service_healthy
    networks:
      - coolify           # réseau de Traefik (Coolify) → routage permanent
      - dolibarr_internal # réseau privé pour parler à MySQL
    volumes:
      - dolibarr_conf:/var/www/html/conf            # conf.php (persiste l'install)
      - dolibarr_documents:/var/www/html/documents  # fichiers uploadés / documents

  dolibarr_db:
    image: mysql:8.0
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      - MYSQL_ROOT_PASSWORD=${DOLIBARR_DB_ROOT_PASSWORD}
      - MYSQL_DATABASE=dolibarr
      - MYSQL_USER=dolibarr
      - MYSQL_PASSWORD=${DOLIBARR_DB_PASSWORD}
    networks:
      - dolibarr_internal
    volumes:
      - dolibarr_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DOLIBARR_DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

networks:
  # Réseau partagé du proxy Coolify (NE PAS recréer — il existe déjà)
  coolify:
    external: true
  # Réseau privé Dolibarr ↔ MySQL
  dolibarr_internal:
    driver: bridge

volumes:
  dolibarr_conf:        # /var/www/html/conf — configuration (conf.php)
  dolibarr_documents:   # /var/www/html/documents — fichiers uploadés
  dolibarr_db_data:     # /var/lib/mysql — base de données
