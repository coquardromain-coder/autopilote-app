# ════════════════════════════════════════════════════════════════
#  Dolibarr sur Coolify v4.1.1 — VERSION RECOMMANDÉE (Coolify-native)
# ════════════════════════════════════════════════════════════════
#
# Pourquoi cette version : sur Coolify, le bloc `networks:` manuel + le réseau
# "coolify" external créent souvent un CONFLIT qui empêche Traefik d'atteindre
# le conteneur → Bad Gateway. Ici on NE déclare AUCUN réseau ni label : Coolify
# crée le réseau du projet, y connecte Traefik ET les deux services, et génère
# les labels Traefik automatiquement à partir de la variable magique
# SERVICE_FQDN_DOLIBARR_80.
#
# ┌─ DANS COOLIFY ────────────────────────────────────────────────┐
# │ 1. Ressource Docker Compose → colle ce fichier.                │
# │ 2. Onglet "Domains" du SERVICE dolibarr :                      │
# │       https://dolibarr.famcofinances.com                       │
# │ 3. Environment Variables : les 4 DOLIBARR_* (voir .env.example)│
# │ 4. Deploy → ATTENDS 2-3 min (init MySQL + install Dolibarr).   │
# └───────────────────────────────────────────────────────────────┘

services:
  dolibarr:
    image: tuxgasy/dolibarr:latest
    restart: unless-stopped
    environment:
      # ▼ Variable magique Coolify : expose le service "dolibarr" sur le port 80
      #   et génère automatiquement le routage Traefik vers le domaine.
      - SERVICE_FQDN_DOLIBARR_80
      - DOLI_DB_HOST=dolibarr_db
      - DOLI_DB_NAME=dolibarr
      - DOLI_DB_USER=dolibarr
      - DOLI_DB_PASSWORD=${DOLIBARR_DB_PASSWORD}
      - DOLI_ADMIN_LOGIN=admin
      - DOLI_ADMIN_PASSWORD=${DOLIBARR_ADMIN_PASSWORD}
      - DOLI_URL_ROOT=https://dolibarr.famcofinances.com
      - DOLI_COMPANY_NAME=${DOLIBARR_COMPANY_NAME}
      - DOLI_COMPANY_COUNTRY_ID=1
      - DOLI_MODULES=modFacture,modCommande,modComptabilite,modSociete,modProduct,modPropal,modBanque,modTax
      - DOLI_INSTALL_AUTO=1
      - DOLI_PROD=1
      - PHP_INI_DATE_TIMEZONE=Europe/Paris
    depends_on:
      dolibarr_db:
        condition: service_healthy
    volumes:
      - dolibarr_documents:/var/www/documents

  dolibarr_db:
    image: mysql:8.0
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      - MYSQL_ROOT_PASSWORD=${DOLIBARR_DB_ROOT_PASSWORD}
      - MYSQL_DATABASE=dolibarr
      - MYSQL_USER=dolibarr
      - MYSQL_PASSWORD=${DOLIBARR_DB_PASSWORD}
    volumes:
      - dolibarr_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DOLIBARR_DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

volumes:
  dolibarr_documents:
  dolibarr_db_data:
