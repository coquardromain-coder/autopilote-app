# VirtualHost Apache pour Dolibarr 19.x — corrige l'API REST
# ("API not found / failed to include API file").
#
# Cause : Apache ne transmettait pas PATH_INFO (le segment "/version" après
# index.php) à PHP, donc Restler ne pouvait pas router l'appel API.
# Correctif clé : AcceptPathInfo On (global + sur /api) + mod_rewrite.

<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html

    # CRUCIAL : autorise la transmission de PATH_INFO à PHP (ex: /api/index.php/version)
    AcceptPathInfo On

    <Directory /var/www/html>
        AllowOverride All
        Options -Indexes +FollowSymLinks
        Require all granted
        AcceptPathInfo On
    </Directory>

    # API REST Dolibarr
    <Directory /var/www/html/api>
        AllowOverride All
        Options -Indexes +FollowSymLinks
        Require all granted

        # PATH_INFO indispensable pour le routage Restler (/api/index.php/version)
        AcceptPathInfo On

        RewriteEngine On
        # URLs propres optionnelles : /api/xxx -> /api/index.php/xxx
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^index\.php - [L]
        RewriteRule ^(.*)$ index.php/$1 [QSA,L]
    </Directory>

    # Transmet l'en-tête Authorization/DOLAPIKEY au script PHP (proxies/FastCGI)
    SetEnvIf Authorization "(.*)" HTTP_AUTHORIZATION=$1

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
